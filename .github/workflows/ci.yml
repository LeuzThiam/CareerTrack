name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore CareerTrack.slnx

      - name: Build
        run: dotnet build CareerTrack.slnx --no-restore --configuration Release

      # L'étape de test sera ajoutée à la Phase 14, quand les projets de tests existeront.
