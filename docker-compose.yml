services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD:?Définis DB_PASSWORD dans un fichier .env avant de lancer docker compose}"
    ports:
      - "1433:1433"
    volumes:
      - careertrack-db-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=db;Database=CareerTrackDb;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True"
      APPLY_MIGRATIONS_ON_STARTUP: "true"
    ports:
      - "8080:8080"
    volumes:
      - careertrack-uploads:/app/App_Data/Uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  careertrack-db-data:
  careertrack-uploads:
